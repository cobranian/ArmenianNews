name: Hourly snapshot & deploy

on:
  schedule:
    - cron: '0 * * * *' # every hour, on the hour (UTC)
  workflow_dispatch: {} # allow manual runs
  push:
    branches: [main]

permissions:
  contents: write # commit refreshed data

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Refresh news + agenda. Instagram/Facebook are curated and untouched.
      # Only the hourly schedule (or a manual run) takes a snapshot — a push
      # to main just rebuilds & redeploys, so there is exactly 1 snapshot/hour.
      - name: Scrape hourly snapshot
        if: github.event_name != 'push'
        run: npm run scrape

      - name: Commit refreshed data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/news.json src/data/agenda.json src/data/meta.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: hourly snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          set +e
          out=$(npx --yes firebase-tools@latest deploy \
            --only hosting --project armenie-info --non-interactive 2>&1)
          code=$?
          echo "$out"
          # Firebase rejects a release whose content is identical to the
          # currently live version (e.g. an hour with no data change).
          # That's a successful no-op, not a failure.
          if [ $code -ne 0 ] && echo "$out" | grep -q "is the current active version"; then
            echo "::notice::Content unchanged — already live. Skipping."
            exit 0
          fi
          exit $code
