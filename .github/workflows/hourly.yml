name: Hourly snapshot & deploy

on:
  schedule:
    - cron: '0 * * * *' # every hour, on the hour (UTC)
  workflow_dispatch: {} # allow manual runs
  push:
    branches: [main]

permissions:
  contents: write # commit refreshed data
  pages: write # deploy to Pages
  id-token: write # OIDC for Pages

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Refresh news + agenda. Instagram/Facebook are curated and untouched.
      - name: Scrape hourly snapshot
        run: npm run scrape

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/news.json src/data/agenda.json src/data/meta.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: hourly snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      # --- Firebase Hosting ---
      # Firebase serves from the domain root, so rebuild with base '/'
      # (the default '/ArmenianNews/' base is only for GitHub Pages).
      - name: Build for Firebase (root base)
        run: npm run build
        env:
          BASE_PATH: /

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          set +e
          out=$(npx --yes firebase-tools@latest deploy \
            --only hosting --project armeniensdelausanne --non-interactive 2>&1)
          code=$?
          echo "$out"
          # Firebase rejects a release whose content is identical to the
          # currently live version (e.g. an hour with no data change).
          # That's a successful no-op, not a failure.
          if [ $code -ne 0 ] && echo "$out" | grep -q "is the current active version"; then
            echo "::notice::Content unchanged — already live. Skipping."
            exit 0
          fi
          exit $code

  deploy:
    needs: snapshot
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
