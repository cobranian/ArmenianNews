name: Hourly snapshot & deploy

on:
  schedule:
    - cron: '0 * * * *' # every hour, on the hour (UTC)
  workflow_dispatch: {} # allow manual runs
  push:
    branches: [main]

permissions:
  contents: write # commit refreshed data

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Refresh news + agenda on EVERY run — schedule, manual dispatch, AND push.
      # A push now takes a fresh snapshot too, so a code change ships with current
      # data instead of redeploying the last hour's. Instagram/Facebook are
      # curated and untouched. Loop-safe: the "Commit refreshed data" step below
      # pushes with the default GITHUB_TOKEN, and GitHub deliberately does NOT
      # trigger a new workflow run from a GITHUB_TOKEN push — so the snapshot
      # commit cannot re-trigger this workflow.
      - name: Scrape hourly snapshot
        env:
          # Always-on Cloudflare Worker proxy for armradio (optional; the
          # scraper falls back to direct/Google News if unset). See proxy/.
          ARMRADIO_PROXY: ${{ vars.ARMRADIO_PROXY }}
          # Cloudflare Worker proxy for Asbarez — required from CI: both editions
          # 403 datacenter IPs, so without it the Asbarez feed comes back empty.
          ASBAREZ_PROXY: ${{ vars.ASBAREZ_PROXY }}
        run: npm run scrape

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/news.json src/data/agenda.json src/data/meta.json src/data/instagram-feed.json public/sitemap.xml
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: hourly snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Build
        run: npm run build

      # Regenerate the Don Narek carousel preview each hour and drop it into
      # dist/ so the deploy publishes it (armenie-info.web.app/don-narek-*.png).
      # Best-effort: a screenshot failure must never block the deploy.
      - name: Set up Chrome (for screenshot)
        id: chrome
        continue-on-error: true
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Screenshot Don Narek carousel into dist/
        continue-on-error: true
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run screenshot

      # Bake the rendered app into dist/index.html so crawlers get the
      # snapshot's articles in raw HTML instead of an empty #root.
      # Best-effort, like the screenshot: a prerender failure must never
      # block the deploy — worst case we ship the plain SPA, as before.
      - name: Prerender dist/index.html
        continue-on-error: true
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run prerender

      - name: Deploy to Firebase Hosting
        env:
          # Dedicated deploy identity (github-action-*), Firebase Hosting Admin
          # and nothing else. The old secret held the firebase-adminsdk key,
          # which could also bypass database security rules and mint tokens for
          # other service accounts — far more than publishing a static site needs.
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ARMENIE_INFO }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          set +e
          # Pinned, not @latest: this runs with the deploy service account in
          # its environment, so a single malicious release would hand over the
          # credential. Bump deliberately.
          out=$(npx --yes firebase-tools@15.23.0 deploy \
            --only hosting --project armenie-info --non-interactive 2>&1)
          code=$?
          echo "$out"
          # Firebase rejects a release whose content is identical to the
          # currently live version (e.g. an hour with no data change).
          # That's a successful no-op, not a failure.
          if [ $code -ne 0 ] && echo "$out" | grep -q "is the current active version"; then
            echo "::notice::Content unchanged — already live. Skipping."
            exit 0
          fi
          exit $code
