name: Hourly snapshot & deploy

on:
  schedule:
    - cron: '0 * * * *' # every hour, on the hour (UTC)
  workflow_dispatch: {} # allow manual runs
  push:
    branches: [main]

permissions:
  contents: write # commit refreshed data
  pages: write # deploy to Pages
  id-token: write # OIDC for Pages

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Refresh news + agenda. Instagram/Facebook are curated and untouched.
      - name: Scrape hourly snapshot
        run: npm run scrape

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/news.json src/data/agenda.json src/data/meta.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: hourly snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # --- Firebase Hosting ---
      # Firebase serves from the domain root, so rebuild with base '/'
      # (the default '/ArmenianNews/' base is only for GitHub Pages).
      - name: Build for Firebase (root base)
        run: npm run build
        env:
          BASE_PATH: /

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: armeniensdelausanne
          channelId: live

  deploy:
    needs: snapshot
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
