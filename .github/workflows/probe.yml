# TEMPORARY diagnostic — manual-dispatch only. Runs scripts/probe-armenpress.mjs
# from the GitHub Actions runner to see which fetch method (if any) sees fresh
# Armenpress fr/en data from CI's datacenter IP. No scrape, no commit, no deploy.
# Delete this file + scripts/probe-armenpress.mjs once the fix is chosen.
name: Probe Armenpress (temp)

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Probe Armenpress from CI
        run: node scripts/probe-armenpress.mjs
