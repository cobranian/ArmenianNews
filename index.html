<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Arménie Info - actualites, agenda et reseaux sociaux armeniens, mis a jour chaque jour." />
    <meta name="theme-color" content="#100f0d" />
    <title>Arménie Info · Արմենիա Ինֆո</title>

    <!-- Ararat's twin peaks, apricot on basalt. SVG for modern browsers,
         32px PNG for the ones that ignore it, 180px for the iOS home screen. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- "Apricot Press" typography: Fraunces (optical display serif),
         Hanken Grotesk (body grotesque), Space Mono (datelines / wire),
         Noto Serif + Sans Armenian (Armenian script) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,600&family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Serif+Armenian:wght@400;500;600;700&family=Noto+Sans+Armenian:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- set saved day/night theme before paint to avoid a flash -->
    <script src="/theme-init.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
